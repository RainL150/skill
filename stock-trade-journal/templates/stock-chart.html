<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #18181b;
      --muted: #71717a;
      --line: #e4e4e7;
      --green: #26a69a;
      --red: #ef5350;
      --blue: #2962ff;
      --amber: #f59e0b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px;
    }
    .shell {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 16px 50px rgba(15, 23, 42, 0.08);
    }
    header {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      padding: 22px 24px 18px;
      border-bottom: 1px solid var(--line);
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .meta {
      margin-top: 8px;
      color: var(--muted);
      font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .price {
      text-align: right;
      min-width: 220px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .last {
      font-size: 32px;
      font-weight: 700;
    }
    .change {
      margin-top: 6px;
      font-size: 14px;
      font-weight: 700;
    }
    .positive { color: var(--green); }
    .negative { color: var(--red); }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--line);
      background: #fafafa;
    }
    .tabs {
      display: flex;
      gap: 6px;
      background: #eef0f2;
      padding: 4px;
      border-radius: 7px;
    }
    button {
      border: 0;
      border-radius: 5px;
      padding: 7px 12px;
      background: transparent;
      color: #52525b;
      font-weight: 700;
      cursor: pointer;
    }
    button.active {
      background: #ffffff;
      color: #18181b;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.12);
    }
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 10px;
      background: #ffffff;
    }
    .pill.positive {
      border-color: rgba(38, 166, 154, 0.28);
      background: rgba(38, 166, 154, 0.08);
    }
    .pill.negative {
      border-color: rgba(239, 83, 80, 0.28);
      background: rgba(239, 83, 80, 0.08);
    }
    #chart {
      width: 100%;
      height: 560px;
    }
    .details {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 0;
      border-top: 1px solid var(--line);
    }
    .section {
      min-width: 0;
      padding: 18px 24px;
      border-right: 1px solid var(--line);
    }
    .section:last-child { border-right: 0; }
    h2 {
      margin: 0 0 12px;
      font-size: 14px;
      letter-spacing: 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 9px 8px;
      border-top: 1px solid #f0f0f1;
      text-align: left;
      vertical-align: top;
    }
    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }
    td.num, th.num {
      text-align: right;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .empty {
      color: var(--muted);
      font-size: 13px;
      padding: 16px 0;
    }
    .note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      margin-top: 12px;
    }
    @media (max-width: 820px) {
      .page { padding: 12px; }
      header, .toolbar { flex-direction: column; align-items: stretch; }
      .price { text-align: left; min-width: 0; }
      #chart { height: 480px; }
      .details { grid-template-columns: 1fr; }
      .section { border-right: 0; border-bottom: 1px solid var(--line); }
      .section:last-child { border-bottom: 0; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="shell">
      <header>
        <div>
          <h1 id="title"></h1>
          <div class="meta" id="meta"></div>
        </div>
        <div class="price">
          <div class="last" id="lastPrice"></div>
          <div class="change" id="change"></div>
        </div>
      </header>
      <div class="toolbar">
        <div class="tabs">
          <button id="areaBtn" class="active" type="button">曲线</button>
          <button id="candleBtn" type="button">K线</button>
        </div>
        <div class="stats" id="stats"></div>
      </div>
      <div id="chart"></div>
      <div class="details">
        <section class="section">
          <h2>交易标注</h2>
          <div id="trades"></div>
        </section>
        <section class="section">
          <h2>关注</h2>
          <div id="watch"></div>
          <div class="note">观察笔记会按时间挂到图上，不包含买卖行为。</div>
        </section>
      </div>
    </div>
  </div>

  <script src="assets/echarts.min.js"></script>
  <script>
    const payload = {{PAYLOAD_JSON}};
    let chart = null;
    let chartType = payload.chartType || "area";

    const money = (value) => {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return "-";
      return Number(value).toFixed(3);
    };
    const signedMoney = (value) => {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return "-";
      const num = Number(value);
      return `${num >= 0 ? "+" : ""}${num.toFixed(2)}`;
    };
    const signedPct = (value) => {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return "-";
      const num = Number(value);
      return `${num >= 0 ? "+" : ""}${num.toFixed(2)}%`;
    };
    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;",
    }[char]));
    const axisDate = (value, daySpan) => {
      const date = new Date(value);
      if (daySpan > 60) {
        return date.toLocaleDateString("zh-CN", { year: "2-digit", month: "2-digit", day: "2-digit" });
      }
      return date.toLocaleDateString("zh-CN", { month: "2-digit", day: "2-digit" });
    };
    const tooltipDate = (value) => new Date(value).toLocaleDateString("zh-CN", {
      year: "numeric", month: "2-digit", day: "2-digit"
    });
    const fullDate = (value) => new Date(value).toLocaleString("zh-CN", {
      year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit"
    });

    function closestIndex(timestampSeconds, timestamps) {
      if (!timestamps.length) return -1;
      if (timestampSeconds > timestamps[timestamps.length - 1]) return timestamps.length - 1;
      if (timestampSeconds < timestamps[0]) return -1;
      let best = 0;
      let bestDiff = Math.abs(timestampSeconds - timestamps[0]);
      for (let i = 1; i < timestamps.length; i++) {
        const diff = Math.abs(timestampSeconds - timestamps[i]);
        if (diff < bestDiff) {
          best = i;
          bestDiff = diff;
        }
      }
      return best;
    }

    function renderHeader() {
      const records = payload.ohlc || [];
      const last = records[records.length - 1]?.close ?? records[records.length - 1]?.open ?? 0;
      document.getElementById("title").textContent = `${payload.name || payload.tsCode} ${payload.tsCode}`;
      document.getElementById("meta").textContent = `${payload.exchange || "-"} · ${payload.yfSymbol || ""} · ${payload.period || ""}/${payload.interval || ""} · ${records.length} bars · ${payload.generatedAt}`;
      document.getElementById("lastPrice").textContent = money(last);
      const pnl = payload.metrics?.unrealizedPnl;
      const pnlPct = payload.metrics?.unrealizedPnlPct;
      const pnlCls = Number(pnl || 0) >= 0 ? "positive" : "negative";
      const change = document.getElementById("change");
      if (pnl === null || pnl === undefined || pnlPct === null || pnlPct === undefined) {
        change.className = "change";
        change.textContent = "未持仓";
      } else {
        change.className = `change ${pnlCls}`;
        change.textContent = `${signedMoney(pnl)} (${signedPct(pnlPct)})`;
      }
      const stats = [
        { text: `持仓 ${payload.position?.quantity ?? 0}` },
        { text: `均价 ${money(payload.position?.avgCost)}` },
        { text: `市值 ${money(payload.metrics?.marketValue)}` },
        { text: `浮盈 ${signedMoney(pnl)}`, cls: pnl === null || pnl === undefined ? "" : pnlCls },
        { text: `收益 ${signedPct(pnlPct)}`, cls: pnlPct === null || pnlPct === undefined ? "" : pnlCls },
        { text: `交易 ${payload.trades.length}` },
        { text: `关注 ${payload.watch ? 1 : 0}` },
        { text: `关注记录 ${payload.watchNotes?.length ?? 0}` },
      ];
      document.getElementById("stats").innerHTML = stats.map(item => `<span class="pill ${item.cls || ""}">${escapeHtml(item.text)}</span>`).join("");
    }

    function renderTables() {
      const tradesEl = document.getElementById("trades");
      if (!payload.trades.length) {
        tradesEl.innerHTML = '<div class="empty">暂无交易记录</div>';
      } else {
        tradesEl.innerHTML = `
          <table>
            <thead><tr><th>时间</th><th>方向</th><th class="num">价格</th><th class="num">数量</th><th>笔记</th></tr></thead>
            <tbody>
              ${payload.trades.slice().reverse().map(t => `
                <tr>
                  <td>${escapeHtml(fullDate(t.timestamp))}</td>
                  <td class="${t.side === "BUY" ? "positive" : "negative"}">${t.side}</td>
                  <td class="num">${money(t.price)}</td>
                  <td class="num">${escapeHtml(t.quantity)}</td>
                  <td>${escapeHtml(t.memo || "-")}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>`;
      }
      const watchEl = document.getElementById("watch");
      const notes = payload.watchNotes || [];
      const notesHtml = notes.length ? `
        <h2 style="margin-top:0;">关注记录</h2>
        <table>
          <thead><tr><th>时间</th><th>笔记</th></tr></thead>
          <tbody>
            ${notes.slice().reverse().map(item => `
              <tr>
                <td>${escapeHtml(fullDate(item.timestamp))}</td>
                <td>${escapeHtml(item.note || "-")}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      ` : '<h2 style="margin-top:0;">关注记录</h2><div class="empty">暂无关注记录</div>';
      watchEl.innerHTML = notesHtml;
    }

    function tradeTooltipRows(trades) {
      if (!trades?.length) return "";
      return `
        <div style="height:1px;background:#eceff3;margin:8px 0;"></div>
        <div style="font-weight:700;margin-bottom:6px;">交易笔记</div>
        ${trades.map(t => {
          const source = t.source ? ` · ${t.source}` : "";
          return `
            <div style="margin:7px 0 0;">
              <div><strong>${escapeHtml(t.side)}</strong> ${escapeHtml(t.quantity)} @ <strong>${money(t.price)}</strong>${escapeHtml(source)}</div>
              <div style="color:#6b7280;">时间：${escapeHtml(fullDate(t.timestamp))}</div>
              ${t.memo ? `<div style="color:#6b7280;">笔记：${escapeHtml(t.memo)}</div>` : ""}
            </div>`;
        }).join("")}
      `;
    }

    function watchTooltipRows(lastPrice) {
      if (!payload.watch) return "";
      const w = payload.watch;
      const rows = [];
      if (w.targetPrice) rows.push(`目标价 ${money(w.targetPrice)}，距现价 ${signedPct((lastPrice / Number(w.targetPrice) - 1) * 100)}`);
      if (w.stopLoss) rows.push(`止损价 ${money(w.stopLoss)}，距现价 ${signedPct((lastPrice / Number(w.stopLoss) - 1) * 100)}`);
      if (!rows.length && !w.memo) return "";
      return `
        <div style="height:1px;background:#eceff3;margin:8px 0;"></div>
        <div style="font-weight:700;margin-bottom:6px;">关注触发</div>
        ${rows.map(row => `<div>${escapeHtml(row)}</div>`).join("")}
        ${w.memo ? `<div style="color:#6b7280;margin-top:4px;">笔记：${escapeHtml(w.memo)}</div>` : ""}
      `;
    }

    function watchNoteTooltipRows(notes) {
      if (!notes?.length) return "";
      return `
        <div style="height:1px;background:#eceff3;margin:8px 0;"></div>
        <div style="font-weight:700;margin-bottom:6px;">关注记录</div>
        ${notes.map(item => `
          <div style="margin:7px 0 0;">
            <div style="color:#6b7280;">时间：${escapeHtml(fullDate(item.timestamp))}</div>
            <div>${escapeHtml(item.note || "-")}</div>
          </div>
        `).join("")}
      `;
    }

    function buildOption() {
      const records = payload.ohlc || [];
      const startTime = records[0] ? new Date(records[0].date).getTime() : 0;
      const endTime = records[records.length - 1] ? new Date(records[records.length - 1].date).getTime() : 0;
      const daySpan = Math.round((endTime - startTime) / 86400000);
      const categories = records.map(r => axisDate(r.date, daySpan));
      const timestamps = records.map(r => Math.floor(new Date(r.date).getTime() / 1000));
      const candle = records.map(r => [r.open, r.close, r.low, r.high]);
      const line = records.map(r => r.close);
      const validPrices = records.flatMap(r => [r.low, r.high]).filter(v => v !== null && v !== undefined);
      const min = validPrices.length ? Math.min(...validPrices) : 0;
      const max = validPrices.length ? Math.max(...validPrices) : 1;
      const range = Math.max(max - min, 1);
      const last = records[records.length - 1]?.close ?? 0;
      const first = records[0]?.close ?? 0;
      const positive = last >= first;
      const lineColor = positive ? "#26a69a" : "#ef5350";
      const avgCost = Number(payload.position?.avgCost || 0);

      const grouped = new Map();
      for (const trade of payload.trades) {
        const idx = closestIndex(Math.floor(new Date(trade.timestamp).getTime() / 1000), timestamps);
        if (idx < 0) continue;
        if (!grouped.has(idx)) grouped.set(idx, []);
        grouped.get(idx).push(trade);
      }
      const watchNoteGrouped = new Map();
      for (const item of payload.watchNotes || []) {
        const idx = closestIndex(Math.floor(new Date(item.timestamp).getTime() / 1000), timestamps);
        if (idx < 0) continue;
        if (!watchNoteGrouped.has(idx)) watchNoteGrouped.set(idx, []);
        watchNoteGrouped.get(idx).push(item);
      }
      const markPoints = [];
      for (const [idx, trades] of grouped.entries()) {
        const hasBuy = trades.some(t => t.side === "BUY");
        const hasSell = trades.some(t => t.side === "SELL");
        const type = hasBuy && !hasSell ? "buy" : hasSell && !hasBuy ? "sell" : "mixed";
        const point = records[idx];
        const color = type === "buy" ? "#26a69a" : type === "sell" ? "#ef5350" : "#71717a";
        markPoints.push({
          name: "trade",
          xAxis: categories[idx],
          yAxis: type === "buy" ? point.low : point.high,
          value: trades.length,
          symbol: "circle",
          symbolSize: 22,
          symbolOffset: type === "buy" ? [0, 16] : [0, -16],
          itemStyle: { color, borderColor: "#fff", borderWidth: 2, shadowBlur: 6, shadowColor: "rgba(0,0,0,0.25)" },
          label: { show: true, formatter: type === "buy" ? "B" : type === "sell" ? "S" : "T", color: "#fff", fontSize: 10, fontWeight: "bold" },
          tooltip: {
            formatter: () => `<div style="min-width:220px;">${tradeTooltipRows(trades)}</div>`
          }
        });
      }
      for (const [idx, notes] of watchNoteGrouped.entries()) {
        const point = records[idx];
        markPoints.push({
          name: "watch-note",
          xAxis: categories[idx],
          yAxis: point.close,
          value: notes.length,
          symbol: "diamond",
          symbolSize: 24,
          symbolOffset: [0, -24],
          itemStyle: { color: "#f59e0b", borderColor: "#fff", borderWidth: 2, shadowBlur: 6, shadowColor: "rgba(0,0,0,0.22)" },
          label: { show: true, formatter: "记", color: "#fff", fontSize: 10, fontWeight: "bold" },
          tooltip: {
            formatter: () => `<div style="min-width:220px;">${watchNoteTooltipRows(notes)}</div>`
          }
        });
      }

      const markLines = [];
      if (last > 0) {
        markLines.push({
          yAxis: last,
          lineStyle: { color: lineColor, type: "solid", width: 1.2 },
          label: { formatter: `现${money(last)}`, color: "#fff", backgroundColor: lineColor, borderRadius: 3, padding: [3, 6] }
        });
      }
      if (avgCost > 0 && avgCost >= min - range * 0.5 && avgCost <= max + range * 0.5) {
        markLines.push({
          yAxis: avgCost,
          lineStyle: { color: "#2962ff", type: [6, 3], width: 1.5 },
          label: { formatter: `持${money(avgCost)}`, color: "#fff", backgroundColor: "#2962ff", borderRadius: 3, padding: [3, 6] }
        });
      }
      if (payload.watch?.targetPrice) {
        markLines.push({
          yAxis: payload.watch.targetPrice,
          lineStyle: { color: "#26a69a", type: [4, 4], width: 1.2 },
          label: { formatter: `目标${money(payload.watch.targetPrice)}`, color: "#fff", backgroundColor: "#26a69a", borderRadius: 3, padding: [3, 6] }
        });
      }
      if (payload.watch?.stopLoss) {
        markLines.push({
          yAxis: payload.watch.stopLoss,
          lineStyle: { color: "#ef5350", type: [4, 4], width: 1.2 },
          label: { formatter: `止损${money(payload.watch.stopLoss)}`, color: "#fff", backgroundColor: "#ef5350", borderRadius: 3, padding: [3, 6] }
        });
      }

      const mainSeries = chartType === "candlestick" ? {
        name: "K线",
        type: "candlestick",
        data: candle,
        itemStyle: { color: "#26a69a", color0: "#ef5350", borderColor: "#26a69a", borderColor0: "#ef5350", borderWidth: 1 },
        barWidth: "60%",
      } : {
        name: "价格",
        type: "line",
        data: line,
        smooth: 0.25,
        showSymbol: false,
        lineStyle: { color: lineColor, width: 2 },
        areaStyle: {
          color: {
            type: "linear", x: 0, y: 0, x2: 0, y2: 1,
            colorStops: [
              { offset: 0, color: positive ? "rgba(38, 166, 154, 0.36)" : "rgba(239, 83, 80, 0.36)" },
              { offset: 1, color: positive ? "rgba(38, 166, 154, 0.02)" : "rgba(239, 83, 80, 0.02)" },
            ],
          },
        },
      };
      mainSeries.markPoint = markPoints.length ? { data: markPoints, animation: false } : undefined;

      const tooltipFormatter = (params) => {
        const items = Array.isArray(params) ? params : [params];
        const idx = items.find(item => item?.dataIndex !== undefined)?.dataIndex ?? 0;
        const record = records[idx];
        if (!record) return "";
        const trades = grouped.get(idx) || [];
        const watchNotes = watchNoteGrouped.get(idx) || [];
        const header = `<div style="font-weight:700;font-size:13px;margin-bottom:6px;">${escapeHtml(tooltipDate(record.date))}</div>`;
        const priceRows = chartType === "candlestick" ? `
          <div style="display:grid;grid-template-columns:auto auto;gap:4px 18px;">
            <span style="color:#6b7280;">开盘</span><strong style="text-align:right;">${money(record.open)}</strong>
            <span style="color:#6b7280;">收盘</span><strong style="text-align:right;">${money(record.close)}</strong>
            <span style="color:#6b7280;">最低</span><strong style="text-align:right;">${money(record.low)}</strong>
            <span style="color:#6b7280;">最高</span><strong style="text-align:right;">${money(record.high)}</strong>
            <span style="color:#6b7280;">成交量</span><strong style="text-align:right;">${escapeHtml(record.volume ?? "-")}</strong>
          </div>
        ` : `
          <div style="display:grid;grid-template-columns:auto auto;gap:4px 18px;">
            <span style="color:#6b7280;">收盘</span><strong style="text-align:right;">${money(record.close)}</strong>
            <span style="color:#6b7280;">成交量</span><strong style="text-align:right;">${escapeHtml(record.volume ?? "-")}</strong>
          </div>
        `;
        return `<div style="min-width:230px;max-width:320px;">${header}${priceRows}${tradeTooltipRows(trades)}${watchNoteTooltipRows(watchNotes)}${watchTooltipRows(record.close)}</div>`;
      };

      return {
        animation: false,
        backgroundColor: "#fff",
        grid: { left: 44, right: 96, top: 34, bottom: 72 },
        tooltip: {
          trigger: "axis",
          axisPointer: { type: "cross", snap: true },
          appendToBody: true,
          borderColor: "#d4d8e1",
          extraCssText: "box-shadow:0 10px 30px rgba(15,23,42,.18);border-radius:6px;",
          formatter: tooltipFormatter,
        },
        dataZoom: [
          { type: "inside", start: 0, end: 100 },
          { type: "slider", start: 0, end: 100, height: 24, bottom: 20 }
        ],
        xAxis: {
          type: "category",
          data: categories,
          boundaryGap: chartType === "candlestick",
          axisLine: { show: false },
          axisTick: { show: false },
          axisLabel: { color: "#8a8f98", fontSize: 11, hideOverlap: true },
        },
        yAxis: {
          type: "value",
          scale: true,
          splitLine: { lineStyle: { color: "#eef0f2" } },
          axisLabel: { color: "#8a8f98", formatter: value => money(value) },
        },
        series: [
          mainSeries,
          {
            name: "标线",
            type: "line",
            data: [],
            markLine: markLines.length ? { silent: true, symbol: "none", data: markLines } : undefined,
          }
        ],
      };
    }

    function renderChart(nextType) {
      chartType = nextType || chartType;
      document.getElementById("areaBtn").classList.toggle("active", chartType === "area");
      document.getElementById("candleBtn").classList.toggle("active", chartType === "candlestick");
      if (!chart) return;
      chart.setOption(buildOption(), true);
    }

    document.getElementById("areaBtn").addEventListener("click", () => renderChart("area"));
    document.getElementById("candleBtn").addEventListener("click", () => renderChart("candlestick"));
    renderHeader();
    renderTables();
    if (window.echarts) {
      chart = echarts.init(document.getElementById("chart"));
      window.addEventListener("resize", () => chart.resize());
      renderChart(chartType);
    } else {
      document.getElementById("chart").innerHTML = '<div class="empty" style="padding: 28px;">图表库加载失败：请确认同目录 assets/echarts.min.js 存在。</div>';
    }
  </script>
</body>
</html>
