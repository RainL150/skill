<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #18181b;
      --muted: #71717a;
      --line: #e4e4e7;
      --green: #26a69a;
      --red: #ef5350;
      --blue: #2962ff;
      --amber: #f59e0b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px;
    }
    .shell {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 16px 50px rgba(15, 23, 42, 0.08);
    }
    header {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      padding: 22px 24px 18px;
      border-bottom: 1px solid var(--line);
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .meta {
      margin-top: 8px;
      color: var(--muted);
      font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .price {
      text-align: right;
      min-width: 220px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .last {
      font-size: 32px;
      font-weight: 700;
    }
    .change {
      margin-top: 6px;
      font-size: 14px;
      font-weight: 700;
    }
    .positive { color: var(--green); }
    .negative { color: var(--red); }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--line);
      background: #fafafa;
    }
    .tabs {
      display: flex;
      gap: 6px;
      background: #eef0f2;
      padding: 4px;
      border-radius: 7px;
    }
    button {
      border: 0;
      border-radius: 5px;
      padding: 7px 12px;
      background: transparent;
      color: #52525b;
      font-weight: 700;
      cursor: pointer;
    }
    button.active {
      background: #ffffff;
      color: #18181b;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.12);
    }
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 10px;
      background: #ffffff;
    }
    #chart {
      width: 100%;
      height: 560px;
    }
    .details {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 0;
      border-top: 1px solid var(--line);
    }
    .section {
      min-width: 0;
      padding: 18px 24px;
      border-right: 1px solid var(--line);
    }
    .section:last-child { border-right: 0; }
    h2 {
      margin: 0 0 12px;
      font-size: 14px;
      letter-spacing: 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 9px 8px;
      border-top: 1px solid #f0f0f1;
      text-align: left;
      vertical-align: top;
    }
    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }
    td.num, th.num {
      text-align: right;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .empty {
      color: var(--muted);
      font-size: 13px;
      padding: 16px 0;
    }
    .note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      margin-top: 12px;
    }
    @media (max-width: 820px) {
      .page { padding: 12px; }
      header, .toolbar { flex-direction: column; align-items: stretch; }
      .price { text-align: left; min-width: 0; }
      #chart { height: 480px; }
      .details { grid-template-columns: 1fr; }
      .section { border-right: 0; border-bottom: 1px solid var(--line); }
      .section:last-child { border-bottom: 0; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="shell">
      <header>
        <div>
          <h1 id="title"></h1>
          <div class="meta" id="meta"></div>
        </div>
        <div class="price">
          <div class="last" id="lastPrice"></div>
          <div class="change" id="change"></div>
        </div>
      </header>
      <div class="toolbar">
        <div class="tabs">
          <button id="areaBtn" class="active" type="button">曲线</button>
          <button id="candleBtn" type="button">K线</button>
        </div>
        <div class="stats" id="stats"></div>
      </div>
      <div id="chart"></div>
      <div class="details">
        <section class="section">
          <h2>交易标注</h2>
          <div id="trades"></div>
        </section>
        <section class="section">
          <h2>关注记录</h2>
          <div id="watch"></div>
          <div class="note">目标价和止损价会作为水平线挂到图上；交易记录会按日期贴近最近一根 K 线。</div>
        </section>
      </div>
    </div>
  </div>

  <script src="assets/echarts.min.js"></script>
  <script>
    const payload = {{PAYLOAD_JSON}};
    let chart = null;
    let chartType = payload.chartType || "area";

    const money = (value) => {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return "-";
      return Number(value).toFixed(3);
    };
    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;",
    }[char]));
    const day = (value) => new Date(value).toLocaleDateString("zh-CN", { month: "2-digit", day: "2-digit" });
    const fullDate = (value) => new Date(value).toLocaleString("zh-CN", {
      year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit"
    });

    function closestIndex(timestampSeconds, timestamps) {
      if (!timestamps.length) return -1;
      if (timestampSeconds > timestamps[timestamps.length - 1]) return timestamps.length - 1;
      if (timestampSeconds < timestamps[0]) return -1;
      let best = 0;
      let bestDiff = Math.abs(timestampSeconds - timestamps[0]);
      for (let i = 1; i < timestamps.length; i++) {
        const diff = Math.abs(timestampSeconds - timestamps[i]);
        if (diff < bestDiff) {
          best = i;
          bestDiff = diff;
        }
      }
      return best;
    }

    function renderHeader() {
      const records = payload.ohlc || [];
      const first = records[0]?.close ?? records[0]?.open ?? 0;
      const last = records[records.length - 1]?.close ?? records[records.length - 1]?.open ?? 0;
      const diff = last - first;
      const pct = first ? diff / first * 100 : 0;
      const cls = diff >= 0 ? "positive" : "negative";
      document.getElementById("title").textContent = `${payload.name || payload.tsCode} ${payload.tsCode}`;
      document.getElementById("meta").textContent = `${payload.exchange || "-"} · ${payload.yfSymbol || ""} · ${payload.period || ""}/${payload.interval || ""} · ${records.length} bars · ${payload.generatedAt}`;
      document.getElementById("lastPrice").textContent = money(last);
      const change = document.getElementById("change");
      change.className = `change ${cls}`;
      change.textContent = `${diff >= 0 ? "+" : ""}${money(diff)} (${diff >= 0 ? "+" : ""}${pct.toFixed(2)}%)`;
      const stats = [
        `持仓 ${payload.position?.quantity ?? 0}`,
        `均价 ${money(payload.position?.avgCost)}`,
        `交易 ${payload.trades.length}`,
        `关注 ${payload.watch ? 1 : 0}`,
      ];
      document.getElementById("stats").innerHTML = stats.map(item => `<span class="pill">${item}</span>`).join("");
    }

    function renderTables() {
      const tradesEl = document.getElementById("trades");
      if (!payload.trades.length) {
        tradesEl.innerHTML = '<div class="empty">暂无交易记录</div>';
      } else {
        tradesEl.innerHTML = `
          <table>
            <thead><tr><th>时间</th><th>方向</th><th class="num">价格</th><th class="num">数量</th><th>原因</th></tr></thead>
            <tbody>
              ${payload.trades.slice().reverse().map(t => `
                <tr>
                  <td>${escapeHtml(fullDate(t.timestamp))}</td>
                  <td class="${t.side === "BUY" ? "positive" : "negative"}">${t.side}</td>
                  <td class="num">${money(t.price)}</td>
                  <td class="num">${escapeHtml(t.quantity)}</td>
                  <td>${escapeHtml(t.reason || t.note || "-")}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>`;
      }
      const watchEl = document.getElementById("watch");
      if (!payload.watch) {
        watchEl.innerHTML = '<div class="empty">暂无关注记录</div>';
      } else {
        const w = payload.watch;
        watchEl.innerHTML = `
          <table>
            <tbody>
              <tr><th>名称</th><td>${escapeHtml(w.name || "-")}</td></tr>
              <tr><th>分类</th><td>${escapeHtml(w.category || "-")}</td></tr>
              <tr><th>目标价</th><td class="num">${money(w.targetPrice)}</td></tr>
              <tr><th>止损价</th><td class="num">${money(w.stopLoss)}</td></tr>
              <tr><th>优先级</th><td>${escapeHtml(w.priority ?? 0)}</td></tr>
              <tr><th>原因</th><td>${escapeHtml(w.reason || "-")}</td></tr>
              <tr><th>备注</th><td>${escapeHtml(w.note || "-")}</td></tr>
            </tbody>
          </table>`;
      }
    }

    function buildOption() {
      const records = payload.ohlc || [];
      const startTime = records[0] ? new Date(records[0].date).getTime() : 0;
      const endTime = records[records.length - 1] ? new Date(records[records.length - 1].date).getTime() : 0;
      const daySpan = Math.round((endTime - startTime) / 86400000);
      const categories = records.map(r => {
        const d = new Date(r.date);
        if (daySpan > 370) {
          return d.toLocaleDateString("zh-CN", { year: "2-digit", month: "2-digit", day: "2-digit" });
        }
        return day(r.date);
      });
      const timestamps = records.map(r => Math.floor(new Date(r.date).getTime() / 1000));
      const candle = records.map(r => [r.open, r.close, r.low, r.high]);
      const line = records.map(r => r.close);
      const validPrices = records.flatMap(r => [r.low, r.high]).filter(v => v !== null && v !== undefined);
      const min = validPrices.length ? Math.min(...validPrices) : 0;
      const max = validPrices.length ? Math.max(...validPrices) : 1;
      const range = Math.max(max - min, 1);
      const last = records[records.length - 1]?.close ?? 0;
      const first = records[0]?.close ?? 0;
      const positive = last >= first;
      const lineColor = positive ? "#26a69a" : "#ef5350";
      const avgCost = Number(payload.position?.avgCost || 0);

      const grouped = new Map();
      for (const trade of payload.trades) {
        const idx = closestIndex(Math.floor(new Date(trade.timestamp).getTime() / 1000), timestamps);
        if (idx < 0) continue;
        if (!grouped.has(idx)) grouped.set(idx, []);
        grouped.get(idx).push(trade);
      }
      const markPoints = [];
      for (const [idx, trades] of grouped.entries()) {
        const hasBuy = trades.some(t => t.side === "BUY");
        const hasSell = trades.some(t => t.side === "SELL");
        const type = hasBuy && !hasSell ? "buy" : hasSell && !hasBuy ? "sell" : "mixed";
        const point = records[idx];
        const color = type === "buy" ? "#26a69a" : type === "sell" ? "#ef5350" : "#71717a";
        markPoints.push({
          name: "trade",
          xAxis: categories[idx],
          yAxis: type === "buy" ? point.low : point.high,
          value: trades.length,
          symbol: "circle",
          symbolSize: 22,
          symbolOffset: type === "buy" ? [0, 16] : [0, -16],
          itemStyle: { color, borderColor: "#fff", borderWidth: 2, shadowBlur: 6, shadowColor: "rgba(0,0,0,0.25)" },
          label: { show: true, formatter: type === "buy" ? "B" : type === "sell" ? "S" : "T", color: "#fff", fontSize: 10, fontWeight: "bold" },
          tooltip: {
            formatter: () => trades.map(t => `${fullDate(t.timestamp)}<br/>${t.side} ${t.quantity} @ ${money(t.price)}<br/>${t.reason || t.note || ""}`).join("<hr/>")
          }
        });
      }

      const markLines = [];
      if (avgCost > 0 && avgCost >= min - range * 0.5 && avgCost <= max + range * 0.5) {
        markLines.push({
          yAxis: avgCost,
          lineStyle: { color: "#2962ff", type: [6, 3], width: 1.5 },
          label: { formatter: `持${money(avgCost)}`, color: "#fff", backgroundColor: "#2962ff", borderRadius: 3, padding: [3, 6] }
        });
      }
      if (payload.watch?.targetPrice) {
        markLines.push({
          yAxis: payload.watch.targetPrice,
          lineStyle: { color: "#26a69a", type: [4, 4], width: 1.2 },
          label: { formatter: `目标${money(payload.watch.targetPrice)}`, color: "#fff", backgroundColor: "#26a69a", borderRadius: 3, padding: [3, 6] }
        });
      }
      if (payload.watch?.stopLoss) {
        markLines.push({
          yAxis: payload.watch.stopLoss,
          lineStyle: { color: "#ef5350", type: [4, 4], width: 1.2 },
          label: { formatter: `止损${money(payload.watch.stopLoss)}`, color: "#fff", backgroundColor: "#ef5350", borderRadius: 3, padding: [3, 6] }
        });
      }

      const mainSeries = chartType === "candlestick" ? {
        name: "K线",
        type: "candlestick",
        data: candle,
        itemStyle: { color: "#26a69a", color0: "#ef5350", borderColor: "#26a69a", borderColor0: "#ef5350", borderWidth: 1 },
        barWidth: "60%",
      } : {
        name: "价格",
        type: "line",
        data: line,
        smooth: 0.25,
        showSymbol: false,
        lineStyle: { color: lineColor, width: 2 },
        areaStyle: {
          color: {
            type: "linear", x: 0, y: 0, x2: 0, y2: 1,
            colorStops: [
              { offset: 0, color: positive ? "rgba(38, 166, 154, 0.36)" : "rgba(239, 83, 80, 0.36)" },
              { offset: 1, color: positive ? "rgba(38, 166, 154, 0.02)" : "rgba(239, 83, 80, 0.02)" },
            ],
          },
        },
      };
      mainSeries.markPoint = markPoints.length ? { data: markPoints, animation: false } : undefined;

      return {
        animation: false,
        backgroundColor: "#fff",
        grid: { left: 44, right: 96, top: 34, bottom: 72 },
        tooltip: {
          trigger: "axis",
          axisPointer: { type: "cross", snap: true },
          valueFormatter: value => typeof value === "number" ? money(value) : value,
        },
        dataZoom: [
          { type: "inside", start: 0, end: 100 },
          { type: "slider", start: 0, end: 100, height: 24, bottom: 20 }
        ],
        xAxis: {
          type: "category",
          data: categories,
          boundaryGap: chartType === "candlestick",
          axisLine: { show: false },
          axisTick: { show: false },
          axisLabel: { color: "#8a8f98", fontSize: 11 },
        },
        yAxis: {
          type: "value",
          scale: true,
          splitLine: { lineStyle: { color: "#eef0f2" } },
          axisLabel: { color: "#8a8f98", formatter: value => money(value) },
        },
        series: [
          mainSeries,
          {
            name: "标线",
            type: "line",
            data: [],
            markLine: markLines.length ? { silent: true, symbol: "none", data: markLines } : undefined,
          }
        ],
      };
    }

    function renderChart(nextType) {
      chartType = nextType || chartType;
      document.getElementById("areaBtn").classList.toggle("active", chartType === "area");
      document.getElementById("candleBtn").classList.toggle("active", chartType === "candlestick");
      if (!chart) return;
      chart.setOption(buildOption(), true);
    }

    document.getElementById("areaBtn").addEventListener("click", () => renderChart("area"));
    document.getElementById("candleBtn").addEventListener("click", () => renderChart("candlestick"));
    renderHeader();
    renderTables();
    if (window.echarts) {
      chart = echarts.init(document.getElementById("chart"));
      window.addEventListener("resize", () => chart.resize());
      renderChart(chartType);
    } else {
      document.getElementById("chart").innerHTML = '<div class="empty" style="padding: 28px;">图表库加载失败：请确认同目录 assets/echarts.min.js 存在。</div>';
    }
  </script>
</body>
</html>
